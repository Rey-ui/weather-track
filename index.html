<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/weather-track/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather app</title>
    
    <script type="module" crossorigin src="/weather-track/commonHelpers2.js"></script>
    <link rel="modulepreload" crossorigin href="/weather-track/assets/vendor-8cce9181.js">
    <link rel="modulepreload" crossorigin href="/weather-track/assets/weather-api-19359e28.js">
    <link rel="stylesheet" href="/weather-track/assets/vendor-e5212ee8.css">
    <link rel="stylesheet" href="/weather-track/assets/index-18e84777.css">
  </head>

  <body>
    <header class="header">
      <div class="container">
        <div class="header__content">
          <h1 class="header__title">Weather App</h1>
          <svg class="header__svg" width="35" height="30">
            <use href="./svg/symbol-defs.svg#icon-cloud"></use>
          </svg>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="section popular-cities">
        <div class="container">
          <h2 class="popular-cities__title section-title">Popular Cities</h2>
          <div class="loader hidden">
            <div class="loader_inner"></div>
          </div>
          <ul class="popular-cities__list"></ul>
        </div>
      </section>
      <section class="section our-cities">
        <div class="container">
          <div class="our-cities__container">
            <aside class="our-cities__bar">
              <h3 class="our-cities__title">
                <svg class="our-cities__svg" width="30" height="30">
                  <use href="./svg/symbol-defs.svg#icon-sliders"></use>
                </svg>
                <span>Filters & Sort</span>
              </h3>
              <div class="our-cities__bar-content">
                <div class="our-cities__bar-sorts">
                  <h4 class="our-cities__bar-sorts-title title">Sort By</h4>
                  <div class="our-cities__bar-sorts-btns">
                    <button name="name" class="our-cities__bar-sorts-btn">
                      <div class="our-cities__bar-sorts-cont">
                        <svg width="18" height="18">
                          <use href="./svg/symbol-defs.svg#icon-menu"></use>
                        </svg>
                        <span>Name</span>
                      </div>

                      <svg
                        class="our-cities__bar-sorts-svg"
                        width="18"
                        height="18"
                      >
                        <use href="./svg/symbol-defs.svg#icon-arrow-up"></use>
                      </svg>
                    </button>
                    <button
                      name="temperature"
                      class="our-cities__bar-sorts-btn"
                    >
                      <div class="our-cities__bar-sorts-cont">
                        <svg width="18" height="18">
                          <use
                            href="./svg/symbol-defs.svg#icon-thermometer"
                          ></use>
                        </svg>
                        <span>Temperature</span>
                      </div>

                      <svg
                        class="our-cities__bar-sorts-svg"
                        width="18"
                        height="18"
                      >
                        <use href="./svg/symbol-defs.svg#icon-arrow-up"></use>
                      </svg>
                    </button>
                    <button name="humidity" class="our-cities__bar-sorts-btn">
                      <div class="our-cities__bar-sorts-cont">
                        <svg width="18" height="18">
                          <use href="./svg/symbol-defs.svg#icon-droplet"></use>
                        </svg>
                        <span>Humidity</span>
                      </div>

                      <svg
                        class="our-cities__bar-sorts-svg"
                        width="18"
                        height="18"
                      >
                        <use href="./svg/symbol-defs.svg#icon-arrow-up"></use>
                      </svg>
                    </button>
                    <button name="windSpeed" class="our-cities__bar-sorts-btn">
                      <div class="our-cities__bar-sorts-cont">
                        <svg width="18" height="18">
                          <use href="./svg/symbol-defs.svg#icon-wind"></use>
                        </svg>
                        <span>Wind Speed</span>
                      </div>

                      <svg
                        class="our-cities__bar-sorts-svg"
                        width="18"
                        height="18"
                      >
                        <use href="./svg/symbol-defs.svg#icon-arrow-up"></use>
                      </svg>
                    </button>
                  </div>
                </div>
                <div class="our-cities__bar-clear">
                  <h4 class="our-cities__bar-clear-title title">
                    Quick Actions
                  </h4>
                  <button class="our-cities__clear-btn primary-btn">
                    Clear All Cities
                  </button>
                </div>
              </div>
            </aside>
            <div class="our-cities__content">
              <form class="our-cities__form">
                <input
                  type="text"
                  placeholder="Enter city name..."
                  name="city"
                  class="our-cities__form-input"
                />
                <button type="submit" class="primary-btn our-cities__form-btn">
                  <svg width="18" height="18">
                    <use href="./svg/symbol-defs.svg#icon-plus"></use>
                  </svg>
                  <span>add</span>
                </button>
              </form>
              <button class="primary-btn our-cities__refresh-btn">
                refresh
              </button>
              <div class="our-cities__loader hidden">
                <div class="our-cities__loader_inner"></div>
              </div>
              <ul class="our-cities__list"></ul>
            </div>
          </div>
        </div>
      </section>
      <!-- <img
        src="./img/istockphoto-841828528-612x612.jpg"
        alt=""
        width="200"
        height="200"
      /> -->
    </main>

    <footer class="footer">
      <img class="footer__bg" src="/weather-track/assets/city-picture-83c10a35.png" alt="" />
    </footer>
    
  </body>
</html>
